# DomainScout criteria — tunable config. See docs/TECHNICAL-DESIGN.md.

[ingestion]                       # the hard-invariant gate (TDD §4.2), applied on the way in
tld = "com"                       # .com only, ever
charset = "^[a-z]+$"              # no hyphens/numbers; shared by both tracks
sources = ["whoisfreaks", "dynadot"]
schedule_hint = "late-morning"    # WhoisFreaks feed has ~1-day lag; don't race the upload
# NOTE: the ingestion length ceiling is DERIVED in code = max(primary.max_length,
# secondary.max_length). Do NOT add a separate value here — one source of truth.

[primary]                         # <=8-char dictionary .com
max_length = 8
max_words = 2
allow_invented = true             # true: short invented-but-pronounceable names pass via the pronounce gate

[secondary]                       # 9-12-char invented / geo+service
min_length = 9
max_length = 12                   # widest target => also the derived ingestion ceiling

[dictionary]
zipf_min = 3.0                    # wordfreq zipf_frequency threshold (tunable)
combine = "min"                   # two-word split score = min|mean of the parts

[pronounceability]
min_score = -4.0                  # LOG-space mean-log-prob floor; pass if score >= this.
                                  # Calibrated 2026-07-14 on the 2026-07-11 feed (3717 candidates):
                                  # a MASH-ONLY gate. Removes only unambiguous keyboard-mash
                                  # (xqzk -4.23, qwrtz -4.11, ktzzr -4.30; ~6%/p5=-4.04) while keeping
                                  # every legitimate invented/geo name (zylo -3.88, nuvex -3.61, hvac -3.79).
                                  # The trigram model can't separate borderline invented from borderline
                                  # mash, so a tighter floor only costs recall. Volume control past mash
                                  # removal is the Tier-1 (Haiku) triage's job — see docs/PHASE-3-DESIGN.md.

[scoring]
tier2_cutoff = 30                 # deep-score top N
digest_top_n = 10                 # digest shows top N

[rdap]
endpoint = "https://rdap.verisign.com/com/v1/"
max_requests_per_sec = 1.0        # polite default; Verisign publishes no numeric limit
concurrency = 5                   # simultaneous RDAP lookups (bounded whodap client pool)
max_retries = 4                   # backoff attempts on 429/5xx/network before -> errors bucket
timeout = 15.0                    # per-request seconds
user_agent = "DomainScout/0.1 (personal expired-domain research)"

[rdap.recheck_days]               # per-status re-verify cadence (verified_at staleness, days)
pending_delete = 1
redemption = 2                    # also covers pending-restore rows (classified as redemption)
grace = 7                         # also covers hold-without-RGP rows (classified as grace)
dropped = 7
# 'unknown' absent -> always due (0 d); Phase 4 never emits 'expiring' (no key needed)

[retention]
days = 360                        # raw feeds + digests pruned after this; DB is permanent

[comps]                             # Phase 5a — NameBio comps grounding (free tier, $0)
base_url = "https://api.namebio.com"
retailstats_path = "/retailstats-download"
tldstats_path = "/tldstats-download"
refresh_days = 7                    # aggregated stats move glacially; `comps-refresh` is safe to call
                                    # from the daily cron - each file NO-OPS unless older than this.
                                    # Costs nothing to reverse (set 1) if it ever proves wrong.
shrink_tolerance = 0.8              # refuse a refresh whose row count < 80% of the sidecar's recorded rows
min_rows_retailstats = 1000         # first-run floor (no sidecar baseline to compare against)
min_rows_tldstats = 100
stale_warn_factor = 3               # warn loudly once a cache is older than this x refresh_days.
                                    # An exact-header match means a NameBio column ADD bricks refresh
                                    # until a code change - correct, but it fails silently-forever from
                                    # cron (exit 0), so surface age where we actually look.

# NameBio free-tier rate limits — MEASURED 2026-07-16/17, not taken from the docs:
#   /retailstats, /tldstats  : 4 req / 60 s ROLLING, PER-ENDPOINT (4th ok, 5th -> 429; recovered at
#                              ~64 s). During a /retailstats 429, /tldstats still returned 200.
#   429 headers              : NONE. Cloudflare returns no Retry-After and no X-RateLimit-* --
#                              backoff must be our own; there is nothing to honour.
#   *-download endpoints     : INDEPENDENT, MUCH LONGER window. One download of each succeeded cold,
#                              then both 429'd for >30 min with no other traffic. Exact window
#                              UNCHARACTERIZED (needs hours of polling); known > 30 min.
#                              => a download 429 is NOT retryable in-run. The next daily cron run IS
#                              the retry. This deliberately INVERTS Phase 4's policy, where RDAP 429s
#                              recover in seconds. Both downloads DO succeed back-to-back when cold,
#                              so the refresh's 2 GETs need no sleep between them.
#   WARNING: `comps-refresh --force` can burn the download window and lock you out for HOURS.
#            `comps --domain` is local-only (reads the cache) and never touches the network.

[toxicity]
cdx_base_url = "https://web.archive.org/cdx/search/cdx"
                                 # HTTPS, not HTTP: this box MITMs TLS and the whole codebase is
                                 # hardened for the proxied-TLS path via truststore. One plaintext
                                 # call would be both unencrypted AND on a differently-behaving
                                 # code path from everything we've tested.
cdx_collapse = "timestamp:6"     # One capture/month. ALL shape thresholds and any Tier-2 prompt
                                 # calibration are relative to this sampling. capture_count and
                                 # digest_churn are properties of the SAMPLED series, not the raw
                                 # archive (arguably better: raw counts are dominated by
                                 # crawl-frequency artifacts). Changing it invalidates every cached
                                 # verdict - by design, since entries record their collapse and
                                 # miss on mismatch.
                                 # Applied SERVER-side (legitimate: one urlkey per query, so
                                 # adjacent-row collapse IS monthly collapse), then again
                                 # client-side over the merged two-host set.
cdx_match_type = "exact"         # MEASURED 2026-07-18 (spike, see PHASE-5B-SPIKE.md). NOT "domain":
                                 # matchType=domain spreads the row budget across thousands of
                                 # urlkeys (cnn.com: 2,768), so collapse samples per-URL-block and
                                 # digest_churn reads URL DIVERSITY as content volatility. Two exact
                                 # queries (apex + www.) are issued and merged instead - see
                                 # CdxClient. Deep-subpath history is deliberately given up; it was
                                 # the contamination, and shape is the story of the front door.
cdx_limit = 5000                 # Never engages under the ratified strategy - the worst-case domain
                                 # measured collapses to 311 rows. Kept as a runaway guard only.
cdx_timeout = 20.0               # MEASURED 2026-07-19 (live confirmation, see PHASE-5B-SPIKE.md
                                 # Part 2): single-shot exact+collapse GET latency observed 0.5s
                                 # (never-archived domain) to 16.2s (www.wordpress.com, a busy
                                 # modern site) - close enough to this timeout that an occasional
                                 # retry under load is plausible (one wrapped call to the same host
                                 # took 36.2s, consistent with one retry cycle, though not directly
                                 # confirmed via a captured timeout event). cdx_max_retries below
                                 # already tolerates this; recorded here so 20.0 isn't mistaken for
                                 # generous headroom.
cdx_max_requests_per_sec = 1.0   # paces BOTH the success path and the failure-path backoff
                                 # divisor (final-review fix: before it paced only the
                                 # latter, so a clean run issued its whole request burst -
                                 # measured 30 domains = 60 requests - with zero pacing
                                 # sleeps). CdxClient._pace() sleeps for whatever remains
                                 # of 1/rps since the last GET, using a monotonic clock.
cdx_max_retries = 3
tail_window_months = 24          # the late-life flip window, anchored on last_capture
tail_min_captures = 3            # below this, divergence is None rather than noise

# CDX limits - MEASURED across both spikes (2026-07-18 design spike + 2026-07-19 live
# confirmation, see PHASE-5B-SPIKE.md): 0 HTTP 429/5xx observed across ~65 combined requests to
# web.archive.org's CDX endpoint - "not yet hit," not "confirmed absent," per the original spike's
# own caveat; this was never a dedicated saturation test.
# apex vs www.: MEASURED byte-identical CDX responses (same (timestamp,digest) series) for 16/16
# real domains tested across both sessions (cnn.com, python.org, stackoverflow.com, npmjs.com,
# wordpress.com, medium.com, eff.org, archive.org, github.com, webvan.com, kozmo.com, boo.com,
# flooz.com, theglobe.com, pseudo.com), including domains with a LIVE HTTP 301 between the two
# hosts (e.g. python.org). archive.org's matchType=exact appears to canonicalize away the
# www./apex distinction for every domain sampled so far - CdxClient's two-GET merge has not yet
# actually merged two DIFFERENT series in practice. Kept as-is (cheap insurance, not yet proven
# unnecessary), but do not assume the merge is load-bearing without re-checking this.

gsb_base_url = "https://safebrowsing.googleapis.com/v4/threatMatches:find"
gsb_batch_size = 250             # API cap is 500 URLs; we send 2 schemes x domain
gsb_timeout = 15.0
gsb_threat_types = ["MALWARE", "SOCIAL_ENGINEERING", "UNWANTED_SOFTWARE",
                    "POTENTIALLY_HARMFUL_APPLICATION"]
                                          # final-review fix: VerdictCache now records this
                                          # list (sorted, order-independent) per entry and
                                          # MISSES on a mismatch, exactly like `collapse` -
                                          # adding a threat type here invalidates up to
                                          # cache_days.pass (14d) of verdicts computed
                                          # without it, rather than leaving them stale.
gsb_platform_types = ["ANY_PLATFORM"]     # v4 REQUIRES all three lists. An empty or omitted list
gsb_threat_entry_types = ["URL"]          # returns NO MATCHES rather than erroring - a silent
                                          # false-clean, exactly the failure invariant 2 exists to
                                          # prevent. Asserted in the spike and in tests.

[toxicity.cache_days]
reject = 30
pass = 14
unknown_no_history = 30
# unknown_error is deliberately absent - it is NEVER cached.

[sources.whoisfreaks]             # feed location (confirmed against the live repo 2026-07-14)
base_url = "https://raw.githubusercontent.com/WhoisFreaks/daily-expired-and-dropped-domains/main"
expired_filename = "{date}-free-expired-domains.csv"   # {date} -> YYYY-MM-DD
dropped_filename = "{date}-free-dropped-domains.csv"
